<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 GreenRoom</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="overlay"></div>

    <main class="app">

        <header class="header">

            <div class="branding">
                <h1>🌿 GreenRoom</h1>
                <p>Where conversations grow</p>
            </div>

            <div class="online-pill">
                <span class="dot"></span>
                <span id="onlineUsers">Online: 0</span>
            </div>

        </header>

        <div id="joinContainer" class="join-card">

            <h2>Welcome</h2>

            <p>Choose a username to join the room.</p>

            <div class="join-row">

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                >

                <button id="joinBtn">
                    Join
                </button>

            </div>

        </div>

        <section
            id="chatContainer"
            class="chat-card"
        >

            <div id="messages"></div>

            <div class="input-area">

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message..."
                >

                <button id="sendBtn">
                    ➤
                </button>

                <button id="logoutBtn">
                    Logout
                </button>

            </div>

        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./script.js"></script>

</body>
</html>
